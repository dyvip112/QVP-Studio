
<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>QVP STUDIO | Nghệ Thuật Kể Chuyện Bằng Hình Ảnh</title>
    <link rel="icon" type="image/png" sizes="32x32" href="/images/qvp-favicon.png?v=2" />
    <link rel="shortcut icon" href="/images/qvp-favicon.png?v=2" />
    <link rel="apple-touch-icon" href="/images/qvp-favicon.png?v=2" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;0,600;1,400;1,500;1,600&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,600;1,700&family=Montserrat:wght@600;700;800&family=Roboto:ital,wght@0,300;0,400;0,500;0,700;1,400&display=swap" rel="stylesheet">
    <style>
      :root {
        --canvas-bg: #fcfaf5;
        --ink-color: #0f172a; /* Midnight Blue */
        --accent-blue: #1e40af; /* Primary Navy */
      }
      body {
        font-family: 'Roboto', sans-serif;
        background-color: var(--canvas-bg);
        color: var(--ink-color);
        background-image: url("https://www.transparenttextures.com/patterns/p6.png");
        line-height: 1.7;
        -webkit-font-smoothing: antialiased;
      }
      /* Fonts định danh */
      .font-playfair { font-family: 'Playfair Display', serif; }
      .font-lora { font-family: 'Lora', serif; }
      .font-montserrat { font-family: 'Montserrat', sans-serif; }
      .font-roboto { font-family: 'Roboto', sans-serif; }

      h1, h2, h3, h4, .serif {
        font-family: 'Playfair Display', serif;
        line-height: 1.2;
      }
      
      .sketch-border {
        border-style: solid;
        border-width: 2px;
        border-image: url("data:image/svg+xml;charset=utf-8,%3Csvg width='100' height='100' viewBox='0 0 100 100' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M5 5Q50 2 95 5Q98 50 95 95Q50 98 5 95Q2 50 5 5' stroke='%231e40af' stroke-width='2' vector-effect='non-scaling-stroke'/%3E%3C/svg%3E") 20 stretch;
      }
      
      .floating {
        animation: float 6s ease-in-out infinite;
      }
      
      @keyframes float {
        0% { transform: translateY(0px); }
        50% { transform: translateY(-15px); }
        100% { transform: translateY(0px); }
      }

      /* Fix chữ Q không bị nhầm thành số 2 */
      .no-italic-q {
        display: inline-block;
        font-style: normal !important;
      }

      ::-webkit-scrollbar {
        width: 8px;
      }
      ::-webkit-scrollbar-track {
        background: #f1f1f1;
      }
      ::-webkit-scrollbar-thumb {
        background: var(--accent-blue);
        border-radius: 10px;
      }
      
      /* Cải thiện hiển thị khối text tiêu đề */
      h1 span {
        display: inline-block;
      }

      .app-scale-shell {
        width: 100%;
        overflow-x: hidden;
      }

      @media (min-width: 1024px) {
        .app-scale-shell {
          min-height: 133.333vh;
        }

        .app-scale-content {
          width: 133.333333%;
          transform: scale(0.75);
          transform-origin: top left;
        }
      }
    </style>
  <script type="importmap">
{

  }
}
</script>

</head>
